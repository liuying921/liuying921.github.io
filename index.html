<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>世外风花雪月 - 游戏账号展示</title>
    <style>
        *{margin: 0;padding: 0;box-sizing: border-box;}
        body{
            background-color: #f5f7fa;
            font-family: "微软雅黑",sans-serif;
            padding: 30px;
        }
        .box{
            max-width: 900px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 15px #ddd;
        }
        h1{
            text-align: center;
            color: #c89b3c;
            margin-bottom: 20px;
        }
        .info-item{
            font-size: 18px;
            line-height: 2.2;
            color: #333;
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .tip-red{
            color: #e54343;
            font-weight: bold;
        }
        .title-tip{
            font-weight: bold;
            color: #222;
            font-size: 20px;
            margin: 30px 0 15px;
            display: block;
            border-bottom: 2px solid #eee;
            padding-bottom: 8px;
        }
        img{
            width: 100%;
            border-radius: 8px;
            margin: 10px 0;
        }
        video{
            width: 100%;
            border-radius: 8px;
            margin: 10px 0 20px;
        }
        /* 闲鱼按钮样式 */
        .xianyu-btn{
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 100%;
            margin: 10px 0 25px;
            padding: 18px;
            background: #ff6f00;
            color: #fff;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            border-radius: 10px;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .xianyu-btn:hover{
            transform: scale(1.02);
            box-shadow: 0 4px 12px #ff9547;
        }
        .xianyu-icon-text{
            background-color: #fff;
            color: #ff6f00;
            font-size: 16px;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 4px;
            margin-right: 10px;
        }
        /* 联系我按钮样式 */
        .contact-btn{
            display: block;
            width: 100%;
            max-width: 300px;
            margin: 20px auto 0;
            padding: 12px;
            background: #4285f4;
            color: #fff;
            text-align: center;
            font-size: 16px;
            border-radius: 8px;
            text-decoration: none;
        }
        .link-text{
            text-align:center;
            margin-top:30px;
            color:#666;
            font-size:14px;
        }
        .link-text p{
            margin-top:10px;
            word-break:break-all;
            color:#333;
            background:#f5f5f5;
            padding:10px;
            border-radius:6px;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>世外风花雪月 账号详情展示</h1>

        <div class="info-item">
            游戏昵称：世外风花雪月 <br>
            客户端：苹果QQ区<br>
            区服：高山流水 <br>
            英雄数量：127 位 <br>
            皮肤数量：209 款 <br>
            荣耀典藏：李白 荣耀典藏 ×1 <br>
            王者印记：17 枚 <br>
            <span class="tip-red">【账号保障】支持二次实名 可直接换绑 账号干净无违规</span>
        </div>

        <a href="https://m.tb.cn/h.RhPzfC7?tk=ZqLr5AAjRCk" class="xianyu-btn" target="_blank">
            <span class="xianyu-icon-text">闲鱼</span>
            点击立即前往闲鱼官方购买
        </a>

        <span class="title-tip">账号展示视频</span>
        <video controls controlslist="nodownload">
            <source src="sp.MP4">
            浏览器不支持播放视频
        </video>

        <span class="title-tip">账号截图展示</span>
        <img src="h.png" alt="账号截图">
        <img src="hh.png" alt="皮肤截图">
        <img src="hhh.png" alt="典藏展示">
        <img src="hhhh.png" alt="3">

        <div class="link-text">
            如无法自动跳转，请复制下方链接到浏览器打开：
            <p>https://m.tb.cn/h.RhPzfC7?tk=ZqLr5AAjRCk</p>
        </div>

        <!-- 底部联系按钮，跳转到contact.html -->
        <a href="contact.html" class="contact-btn" target="_blank">
            想给你的账号做同款展示？点我联系我
        </a>
    </div>
</body>
</html>
